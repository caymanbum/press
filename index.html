<!DOCTYPE html>
<html>
<head>
   <title>Iguana License</title>
   <link rel="stylesheet" href="style.css">

   <script src="https://cdn.jsdelivr.net/npm/fengari-web/dist/fengari-web.js"></script>
   <script type="application/lua" src="license.lua"></script>
</head>
<body>
   <div class="LICcontainer">
      <div class="LICtitle">Iguana License</div>

      <div class="LICfield">
         <div class="LIClabel">Iguana ID</div>
         <input id="iguana_id" type="text">
      </div>

      <div class="LICfield">
         <div class="LIClabel">Customer ID</div>
         <input id="customer_id" type="text">
      </div>

      <div class="LICfield">
         <div class="LIClabel">Number of Channels</div>
         <input id="channels" type="number">
      </div>

      <div id="generate_button" class="LICbutton">
         Generate License
      </div>
   </div>
</body>
</html>
